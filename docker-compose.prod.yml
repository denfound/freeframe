# ============================================================
# FreeFrame — Production Docker Compose
# ============================================================
# Usage:
#   cp .env.example .env.prod        # configure your settings
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# SSL: Set DOMAIN and ACME_EMAIL in .env.prod for automatic
#      Let's Encrypt certificates. Without a domain, it runs
#      on HTTP only (port 80).
# ============================================================

services:
  traefik:
    image: traefik:v2.11
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Let's Encrypt automatic certificates (requires DOMAIN and ACME_EMAIL)
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "8635:80"
      - "443:443"
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    env_file:
      - stack.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-freeframe}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      sh -c "if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --requirepass \"$$REDIS_PASSWORD\" --appendonly yes;
      else
        redis-server --appendonly yes;
      fi"
    env_file:
      - stack.env
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" --no-auth-warning ping || redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Optional: self-hosted object storage (MinIO) ────────────────────────────
  # FreeFrame has NO local-filesystem storage backend — it speaks only the S3 API.
  # By default, point it at external S3-compatible storage (AWS S3, R2, B2, Spaces)
  # via the S3_* vars in .env.prod. To instead keep media on THIS host, run your
  # own MinIO by uncommenting the two services below, then:
  #   1. add `miniodata:` under the top-level `volumes:` (see bottom of file);
  #   2. add `depends_on: { minio: { condition: service_healthy } }` to
  #      api / worker / email_worker / beat;
  #   3. in .env.prod set:
  #        S3_STORAGE=minio
  #        S3_ENDPOINT=http://minio:9000
  #        S3_PUBLIC_ENDPOINT=https://storage.${DOMAIN}   # MUST be browser-reachable
  #        S3_ACCESS_KEY / S3_SECRET_KEY = strong values
  # Presigned URLs are handed to the browser, so MinIO must be reachable from
  # OUTSIDE the compose network — that is what the Traefik router below provides
  # (point a `storage.<your-domain>` DNS record at this host). The app sets a
  # public-read policy on the `processed/*` prefix itself on startup.
  #
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z   # 2025+ supports the boto3>=1.36 checksums
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    env_file:
      - stack.env
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      MINIO_CORS_ALLOW_ORIGIN: ${FRONTEND_URL}
      MINIO_CORS_ALLOW_METHODS: GET,PUT,POST,DELETE,HEAD
      MINIO_CORS_ALLOW_HEADERS: "*"
      MINIO_CORS_EXPOSE_HEADERS: ETag,Content-Length,x-amz-request-id
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.minio.rule=Host(`storage.${DOMAIN}`)
      - traefik.http.routers.minio.entrypoints=websecure
      - traefik.http.routers.minio.tls.certresolver=letsencrypt
      - traefik.http.services.minio.loadbalancer.server.port=9000

  minio-init:                     # one-shot: create the bucket (idempotent)
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${S3_ACCESS_KEY} $${S3_SECRET_KEY};
      mc mb --ignore-existing local/$${S3_BUCKET};
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file:
      - stack.env
    environment:
      - DISABLE_DOCS=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "cd /workspace/apps/api && alembic upgrade head && cd /workspace &&
      gunicorn apps.api.main:app
      -w $${API_WORKERS:-4}
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 30"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    labels:
      - traefik.enable=true
      # HTTP router (always active)
      - traefik.http.routers.api.rule=PathPrefix(`/api`)
      - traefik.http.routers.api.entrypoints=web
      - traefik.http.routers.api.middlewares=strip-api-prefix
      # HTTPS router (active when SSL is configured)
      - traefik.http.routers.api-secure.rule=PathPrefix(`/api`)
      - traefik.http.routers.api-secure.entrypoints=websecure
      - traefik.http.routers.api-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.api-secure.middlewares=strip-api-prefix
      - traefik.http.routers.api-secure.service=api
      # Shared
      - traefik.http.middlewares.strip-api-prefix.stripprefix.prefixes=/api
      - traefik.http.services.api.loadbalancer.server.port=8000
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file:
      - stack.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: sh -c "celery -A apps.api.tasks.celery_app worker -Q transcoding -c $${TRANSCODING_CONCURRENCY:-2} --loglevel=warning"
    restart: unless-stopped

  email_worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file:
      - stack.env
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: sh -c "celery -A apps.api.tasks.celery_app worker -Q email_high,email_low -c $${EMAIL_CONCURRENCY:-2} --loglevel=warning"
    restart: unless-stopped

  beat:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    env_file:
      - stack.env
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: sh -c "celery -A apps.api.tasks.celery_app beat --loglevel=warning -s /tmp/celerybeat-schedule"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: /api
    env_file:
      - stack.env
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      - traefik.enable=true
      # HTTP router (always active)
      - traefik.http.routers.web.rule=PathPrefix(`/`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.routers.web.priority=1
      # HTTPS router (active when SSL is configured)
      - traefik.http.routers.web-secure.rule=PathPrefix(`/`)
      - traefik.http.routers.web-secure.entrypoints=websecure
      - traefik.http.routers.web-secure.tls.certresolver=letsencrypt
      - traefik.http.routers.web-secure.priority=1
      - traefik.http.routers.web-secure.service=web
      - traefik.http.services.web.loadbalancer.server.port=3000
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  letsencrypt:
  miniodata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/d/freeframe/minio
